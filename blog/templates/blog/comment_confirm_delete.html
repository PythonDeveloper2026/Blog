{% extends "base.html" %}

{% block title %}Izohni o'chirish - Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center">
                <h2 class="card-title text-danger mb-4">Izohni o'chirish</h2>
                <p class="card-text">Siz haqiqatdan ham ushbu izohni o'chirmoqchimisiz?</p>
                <div class="alert alert-light border mb-4 text-start">
                    "{{ object.content }}"
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mt-4">
                        <button class="btn btn-danger" type="submit">Ha, o'chirish</button>
                        <a class="btn btn-outline-secondary" href="{% url 'post-detail' object.post.slug %}">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
