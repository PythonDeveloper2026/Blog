{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Izohni tahrirlash - Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Izohni tahrirlash</h2>
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-4">
                        <button class="btn btn-primary" type="submit">Saqlash</button>
                        <a class="btn btn-outline-secondary" href="{% url 'post-detail' object.post.slug %}">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
