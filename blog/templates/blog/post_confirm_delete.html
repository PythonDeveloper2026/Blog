{% extends "base.html" %}

{% block title %}Postni o'chirish - Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center">
                <h2 class="card-title text-danger mb-4">Postni o'chirish</h2>
                <p class="card-text">Siz haqiqatdan ham <strong>"{{ object.title }}"</strong> nomli postni o'chirmoqchimisiz?</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mt-4">
                        <button class="btn btn-danger" type="submit">Ha, o'chirish</button>
                        <a class="btn btn-outline-secondary" href="{{ object.get_absolute_url }}">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
