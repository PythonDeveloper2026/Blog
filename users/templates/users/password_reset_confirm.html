{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Yangi parolni o'rnatish - Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Yangi parolni o'rnatish</h2>
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-primary" type="submit">Parolni o'zgartirish</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
