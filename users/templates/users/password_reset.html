{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Parolni tiklash - Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Parolni tiklash</h2>
                <p>Email manzilingizni kiriting. Biz sizga parolni tiklash uchun link yuboramiz.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-primary" type="submit">Link yuborish</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
